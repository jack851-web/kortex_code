# ============================================================
#  虚拟模式配置（仿真环境）
#  - object_position 和 plate_position 支持：
#    1. 具体坐标：[x, y, z]
#    2. "random"：随机生成位置（在工作空间范围内）
# ============================================================

# 工作空间约束（用于random位置生成）
workspace:
  # 机械臂基座位置
  base_position: [0.0, 0.0, 0.0]
  # 桌面区域范围 [x_min, x_max, y_min, y_max, z_surface]
  table_bounds: [0.25, 0.50, -0.25, 0.25, 0.44]
  # 安全边界（距离边缘的最小距离）
  safety_margin: 0.05
  # 物体和plate之间的最小距离
  min_object_plate_distance: 0.15

cameras:
  simu: [top, side, hand]

simulation:
  xml_path: "kortex_simu/simu/env/task_pick_place.xml"
  coord_rotation_z: 0
  initial_joints_unit: deg
  initial_joints: [13.60, -33.43, 38.65, -90.29, -109.65, -76.49]
  initial_gripper: 0.5

  object_library:
    cup:
      model_xml_path: "kortex_simu/simu/object/cup/model_new.xml"
      body_name: "body_obj_cup"
    mug:
      model_xml_path: "kortex_simu/simu/object/mug_5/model_new.xml"
      body_name: "body_obj_mug_5"
    plate:
      model_xml_path: "kortex_simu/simu/object/plate/model_new.xml"
      body_name: "body_obj_plate"
    plate_11:
      model_xml_path: "kortex_simu/simu/object/plate_11/model_new.xml"
      body_name: "body_obj_plate_11"
  plate_target:
    model_xml_path: "kortex_simu/simu/object/plate_11/model_new.xml"
    body_name: "body_obj_plate_11"
    radius: 0.09  # 盘子半径（米），用于任务成功判定

grasp:
  lift_height: 0.1
  micro_lift_height: 0.02
  release_lift_height: 0.08
  object_profiles:
    default:
      orientation: [180, 0, 0]
      pre_grasp_offset: [0, 0, 0.05]
      grasp_offset: [0.0, 0.0, 0.0]
      gripper: {open: 0.0, close: 0.65}
    cup:
      orientation: [176.02, 5.81, -83.23]
      pre_grasp_offset: [0, 0, 0.01]
      grasp_offset: [0.0, 0.012, 0]
      gripper: {open: 0.80, close: 0.80}
    mug:
      orientation: [180, 0, 0]
      pre_grasp_offset: [0, 0, 0.08]
      grasp_offset: [0, 0.06, 0]
      gripper: {open: 0.80, close: 0.80}

dataset:
  mock_simu_data_root: "data/Simu/simu_data"
  fps: 30

tasks:
  task1:
    object_name: "mug"
    object_position: random
    plate_position: [0.35, -0.15, 0.44]
    description: "Pick up the red mug and put it on the white plate"
