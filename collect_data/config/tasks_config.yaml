# ============================================================
#  数据采集系统配置
#  - cameras.simu 支持列表格式 [name, ...] 或字典格式 {name: {...}, ...}
#  - grasp.object_profiles 统一管理抓取参数，按物体类型覆盖 default
# ============================================================

robot:
  ip: "192.168.1.10"

cameras:
  real:
    top:
      type: "opencv"
      index: 0
      width: 640
      height: 480
      fps: 30
  simu: [top, side, hand]

simulation:
  xml_path: "kortex_simu/simu/env/task_pick_place.xml"
  coord_rotation_z: 0
  initial_joints_unit: rad
  initial_joints: [-0.594, 0.135, 0.81, -1.79, -1.33, 0.0]

  object_library:
    cup:
      model_xml_path: "kortex_simu/simu/object/cup/model_new.xml"
      body_name: "body_obj_cup"
    mug:
      model_xml_path: "kortex_simu/simu/object/mug_5/model_new.xml"
      body_name: "body_obj_mug_5"
    plate:
      model_xml_path: "kortex_simu/simu/object/plate/model_new.xml"
      body_name: "body_obj_plate"
    plate_11:
      model_xml_path: "kortex_simu/simu/object/plate_11/model_new.xml"
      body_name: "body_obj_plate_11"
  plate_target:
    model_xml_path: "kortex_simu/simu/object/plate_11/model_new.xml"
    body_name: "body_obj_plate_11"

grasp:
  lift_height: 0.1
  micro_lift_height: 0.02
  release_lift_height: 0.08
  # 统一物体适配参数，按 object_type 查找，找不到则 fallback 到 default
  object_profiles:
    default:
      orientation: [180, 0, 0]
      pre_grasp_offset: [0, 0, 0.05]
      grasp_offset: [0.0, 0.0, 0.0]
      gripper: {open: 0.0, close: 0.65}
    cup:
      orientation: [176.02, 5.81, -83.23]
      pre_grasp_offset: [0, 0, 0.01]
      grasp_offset: [0.0, 0.012, 0]
      gripper: {open: 0.80, close: 0.80}
    mug:
      orientation: [180, 0,0]
      pre_grasp_offset: [0, 0, 0.08]
      grasp_offset: [-0.022, 0.0, 0]
      gripper: {open: 0.80, close: 0.80}

dataset:
  real_data_root: "data/Real/realdata"
  simu_data_root: "data/Real/simudata"
  mock_simu_data_root: "data/Simu/simu_data"
  fps: 30

tasks:
  task1:
    object_name: "mug"
    object_position: [0.35, 0.15, 0.44]
    plate_position: [0.35, -0.15, 0.44]
    description: "grasp mug and place to right side"
  task2:
    object_name: "mug"
    object_position: [0.35, -0.15, 0.44]
    plate_position: [0.35, 0.15, 0.44]
    description: "grasp mug and place to left side"
  task3:
    object_name: "mug"
    object_position: [0.45, 0.0, 0.44]
    plate_position: [0.25, 0.0, 0.44]
    description: "grasp mug and place closer"
  task4:
    object_name: "mug"
    object_position: [0.30, 0.20, 0.44]
    plate_position: [0.40, -0.20, 0.44]
    description: "grasp mug and place diagonally"
  task5:
    object_name: "mug"
    object_position: [0.40, 0.10, 0.44]
    plate_position: [0.30, -0.10, 0.44]
    description: "grasp mug and place to right front"
  task6:
    object_name: "mug"
    object_position: [0.35, 0.0, 0.44]
    plate_position: [0.45, 0.15, 0.44]
    description: "grasp mug from center and place to front right"
